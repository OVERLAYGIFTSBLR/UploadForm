<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Memory Premium</title>

<style>
  :root {
    --accent: #00ff99;
    --accent-glow: rgba(0, 255, 153, 0.3);
    --bg-dark: #050505;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: radial-gradient(circle at 50% -20%, #1a1a1a, #050505);
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* Animated background glow */
  body::before {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: var(--accent);
    filter: blur(150px);
    opacity: 0.05;
    z-index: -1;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .premium-card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 32px;
    width: 90%;
    max-width: 380px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
    position: relative;
  }

  .id-badge {
    display: inline-flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.05);
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #888;
    border: 1px solid rgba(255,255,255,0.05);
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  h2 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 8px 0;
    background: linear-gradient(180deg, #fff 0%, #aaa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p.subtitle {
    font-size: 14px;
    color: #666;
    margin-bottom: 30px;
  }

  /* Premium Upload Area */
  .drop-zone {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: rgba(0,0,0,0.2);
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    overflow: hidden;
    margin-bottom: 30px;
    position: relative;
  }

  .drop-zone:hover {
    border-color: var(--accent);
    background: rgba(0, 255, 153, 0.02);
    transform: scale(1.02);
  }

  #videoPreview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    border-radius: 23px;
  }

  .icon-circle {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
    font-size: 24px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  /* The Button */
  .btn-premium {
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 18px;
    background: #ffffff;
    color: #000;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(255,255,255,0.1);
  }

  .btn-premium:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 40px rgba(0, 255, 153, 0.2);
    background: var(--accent);
  }

  .btn-premium:disabled {
    background: #222;
    color: #555;
    cursor: not-allowed;
    transform: none;
  }

  /* Sleek Progress Bar */
  .prog-wrapper {
    margin-top: 25px;
    display: none;
  }

  .prog-track {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: 0 0 15px var(--accent);
    transition: width 0.4s ease;
  }

  #status {
    margin-top: 15px;
    font-size: 13px;
    color: #888;
    font-weight: 500;
  }

  /* Security Toast */
  #toast {
    visibility: hidden;
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 50, 50, 0.9);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    z-index: 1000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  #toast.show { visibility: visible; animation: popUp 2.5s ease-in-out; }

  @keyframes popUp {
    0% { bottom: 0; opacity: 0; }
    15% { bottom: 40px; opacity: 1; }
    85% { bottom: 40px; opacity: 1; }
    100% { bottom: 0; opacity: 0; }
  }
</style>
</head>
<body>

<div class="premium-card">
  <div class="id-badge">
    <span style="margin-right: 8px; color: var(--accent);">●</span>
    Product: <span id="productLabel" style="margin-left: 5px; color: #fff;">...</span>
  </div>

  <h2>Upload Memory</h2>
  <p class="subtitle">Transform your magnet into a digital portal</p>

  <div class="drop-zone" onclick="document.getElementById('videoFile').click()">
    <div id="placeholder">
      <div class="icon-circle">🎞️</div>
      <div style="font-size: 14px; font-weight: 500; color: #aaa;">Tap to select video</div>
      <div style="font-size: 11px; color: #555; margin-top: 5px;">Max 10MB • MP4 / MOV</div>
    </div>
    <video id="videoPreview" autoplay muted loop playsinline></video>
  </div>

  <input type="hidden" id="productId">
  <input type="file" id="videoFile" accept="video/*" onchange="handlePreview(this)">

  <button class="btn-premium" id="uploadBtn" onclick="uploadVideo()">Finalize Memory</button>

  <div class="prog-wrapper" id="progressBox">
    <div class="prog-track">
      <div class="prog-fill" id="progressBar"></div>
    </div>
    <div id="status">Preparing upload...</div>
  </div>
</div>

<div id="toast">Security Alert: Action Restricted</div>

<script>
// --- FUNCTIONALITY (UNTYPED/UNCHANGED) ---
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyZ8QA9H-1tD6P1exSj4UX-kupANKjQDJ_W3_t6jnTaaqH7IcGR5Ye1lBM9pLnygySBuA/exec";

// Security
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener("keydown", e => {
  if (e.key === "F12" || (e.ctrlKey && e.shiftKey && "IJC".includes(e.key)) || (e.ctrlKey && e.key === "u")) {
    e.preventDefault();
    const t = document.getElementById("toast");
    t.className = "show";
    setTimeout(() => { t.className = ""; }, 2500);
  }
});

// Load ID
window.onload = () => {
  const id = new URLSearchParams(window.location.search).get("product");
  if(id) {
    document.getElementById("productId").value = id;
    document.getElementById("productLabel").innerText = id;
  } else {
    document.getElementById("status").innerText = "⚠️ Missing Product ID";
    document.getElementById("uploadBtn").disabled = true;
  }
};

// Preview
function handlePreview(input) {
  const file = input.files[0];
  if (file) {
    document.getElementById('placeholder').style.display = 'none';
    const preview = document.getElementById('videoPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  }
}

// Upload
async function uploadVideo() {
  const file = document.getElementById("videoFile").files[0];
  const pId = document.getElementById("productId").value;
  const status = document.getElementById("status");
  const bar = document.getElementById("progressBar");
  const box = document.getElementById("progressBox");
  const btn = document.getElementById("uploadBtn");

  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { status.innerText = "Error: File too large (Max 10MB)"; return; }

  btn.disabled = true;
  btn.innerText = "Uploading...";
  box.style.display = "block";
  bar.style.width = "20%";

  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];
    bar.style.width = "55%";
    status.innerText = "Syncing with cloud...";
    
    try {
      await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        cache: "no-cache",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ productId: pId, file: base64, fileName: file.name })
      });

      bar.style.width = "100%";
      status.style.color = "var(--accent)";
      status.innerText = "Memory Secured Successfully";
      btn.innerText = "Completed";
      
    } catch (err) {
      status.innerText = "Connection failed. Please retry.";
      btn.disabled = false;
      btn.innerText = "Retry Upload";
    }
  };
}
</script>

</body>
</html>
