<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Memory | Upload</title>

<style>
  :root {
    --primary: #00ff99;
    --primary-glow: rgba(0, 255, 153, 0.5);
    --bg: #0a0a0a;
    --card-bg: #111111;
    --error: #ff4d4d;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    background: var(--card-bg);
    padding: 30px;
    border-radius: 28px;
    width: 90%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    border: 1px solid #222;
  }

  .product-tag {
    display: inline-block;
    background: rgba(255, 255, 255, 0.05);
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 12px;
    color: #888;
    margin-bottom: 20px;
    border: 1px solid #333;
  }

  /* Match the screenshot's dashed area */
  .upload-zone {
    border: 2px dashed #333;
    border-radius: 20px;
    padding: 10px;
    margin-bottom: 25px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    overflow: hidden;
  }

  #videoPreview {
    width: 100%;
    border-radius: 12px;
    display: none;
  }

  .upload-placeholder {
    color: #666;
    font-size: 14px;
  }

  /* The Button from your screenshot */
  button {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    background: var(--primary);
    color: black;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 10px 20px var(--primary-glow);
    margin-bottom: 20px;
  }

  button:active { transform: scale(0.98); }

  /* Progress Bar */
  .progress-container {
    width: 100%;
    height: 6px;
    background: #222;
    border-radius: 10px;
    margin: 20px 0;
    overflow: hidden;
    display: none;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: var(--primary);
    transition: width 0.3s;
  }

  #status {
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .error-text { color: var(--error); }
  .success-text { color: var(--primary); }

  input[type="file"] { display: none; }

  /* Toast Notification */
  #toast {
    visibility: hidden;
    background: var(--error);
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    position: fixed;
    bottom: 30px;
    font-weight: 600;
    z-index: 100;
  }
  #toast.show { visibility: visible; animation: fadeInOut 2.5s; }
  @keyframes fadeInOut { 0% {opacity:0;} 15% {opacity:1;} 85% {opacity:1;} 100% {opacity:0;} }
</style>
</head>
<body>

<div class="container">
  <div class="product-tag">ID: <span id="productLabel">Loading...</span></div>
  
  <div class="upload-zone" onclick="document.getElementById('videoFile').click()">
    <div id="placeholder" class="upload-placeholder">
      <p style="font-size: 30px; margin:0;">🎬</p>
      <p>Select Video Memory</p>
    </div>
    <video id="videoPreview" controls playsinline></video>
  </div>

  <input type="hidden" id="productId">
  <input type="file" id="videoFile" accept="video/*" onchange="handlePreview(this)">

  <button id="uploadBtn" onclick="uploadVideo()">Upload Memory</button>

  <div class="progress-container" id="progressBox">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="status"></div>
</div>

<div id="toast">Action Disabled</div>

<script>
// --- 1. SECURITY (Anti-Inspect) ---
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener("keydown", e => {
  if (e.key === "F12" || (e.ctrlKey && e.shiftKey && "IJC".includes(e.key)) || (e.ctrlKey && e.key === "u")) {
    e.preventDefault();
    const t = document.getElementById("toast");
    t.className = "show";
    setTimeout(() => { t.className = ""; }, 2500);
  }
});

// --- 2. PREVIEW LOGIC ---
function handlePreview(input) {
  const file = input.files[0];
  if (file) {
    document.getElementById('placeholder').style.display = 'none';
    const preview = document.getElementById('videoPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  }
}

// --- 3. UPLOAD LOGIC ---
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyZ8QA9H-1tD6P1exSj4UX-kupANKjQDJ_W3_t6jnTaaqH7IcGR5Ye1lBM9pLnygySBuA/exec";

window.onload = () => {
  const id = new URLSearchParams(window.location.search).get("product");
  if(id) {
    document.getElementById("productId").value = id;
    document.getElementById("productLabel").innerText = id;
  } else {
    document.getElementById("status").innerHTML = "❌ Missing Product ID";
  }
};

async function uploadVideo() {
  const file = document.getElementById("videoFile").files[0];
  const pId = document.getElementById("productId").value;
  const status = document.getElementById("status");
  const bar = document.getElementById("progressBar");
  const box = document.getElementById("progressBox");
  const btn = document.getElementById("uploadBtn");

  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { status.innerHTML = "❌ Max 10MB allowed"; return; }

  // UI Setup
  btn.disabled = true;
  btn.innerText = "Processing...";
  box.style.display = "block";
  bar.style.width = "20%";

  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];
    bar.style.width = "50%";
    
    try {
      // Use standard fetch but handle it as a POST with text to avoid some CORS pre-flight issues
      const response = await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors", // This prevents the "Failed to fetch" error, but note you won't get the JSON response
        cache: "no-cache",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ productId: pId, file: base64, fileName: file.name })
      });

      // Since mode is 'no-cors', we assume success if the fetch doesn't throw
      bar.style.width = "100%";
      status.innerHTML = "<span class='success-text'>✅ Upload Sent Successfully!</span>";
      btn.innerText = "Done";
      
    } catch (err) {
      status.innerHTML = "<span class='error-text'>❌ Failed to fetch. Try again.</span>";
      btn.disabled = false;
      btn.innerText = "Try Again";
    }
  };
}
</script>

</body>
</html>
